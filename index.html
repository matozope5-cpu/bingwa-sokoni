<!DOCTYPE html>

    <style>

<body>
    <div class="container">
        <div class="top-bar">
            <div class="logo">
                <h1>Starlink Data Bundles</h1>
                <span>Kenya's fastest - Powered by Safaricom</span>
            </div>
            <div class="status-chip">
                <i class="fa-solid fa-bolt"></i> 4G/5G
            </div>
        </div>

        <div class="quick-panel">
            <h2>Affordable Data Bundles</h2>
            <p>Select from our wide range of data plans</p>
            <div class="tag-cloud">
                <span class="tag-new">Daily</span>
                <span class="tag-new">Weekly</span>
                <span class="tag-new">Monthly</span>
                <span class="tag-new">Unlimited</span>
            </div>
        </div>

        <div class="scroll-tabs" id="tabContainer">
            <button class="tab-pill" data-category="all">All Bundles</button>
            <button class="tab-pill" data-category="daily">Daily</button>
            <button class="tab-pill" data-category="weekly">Weekly</button>
            <button class="tab-pill" data-category="monthly">Monthly</button>
            <button class="tab-pill" data-category="unlimited">Unlimited</button>
        </div>

        <div class="bundles-grid" id="bundles-container"></div>

        <div class="footer">
            <div class="footer-logo">Starlink</div>
            <div>© 2025 · Kenya</div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.7.3/dist/sweetalert2.all.min.js"></script>

    <script>
        // ----------------------------- API ENDPOINTS -----------------------------
        const API_ENDPOINTS = {
            initiatePayment: '/api/initiate-payment',
            normalizePhone: '/api/normalize-phone',
            verifyPayment: '/api/verify-payment'
        };

        // ----------------------------- HELPER FUNCTIONS -----------------------------
        // Validates and returns 9-digit Kenyan number (without 0 or 254)
        function validatePhoneNumber(phone) {
            let cleanPhone = phone.replace(/\D/g, '');
            if (cleanPhone.startsWith('0')) cleanPhone = cleanPhone.substring(1);
            if (cleanPhone.startsWith('254')) cleanPhone = cleanPhone.substring(3);
            if (cleanPhone.length !== 9) throw new Error('Enter 9 digits (e.g., 712345678)');
            if (!cleanPhone.startsWith('7') && !cleanPhone.startsWith('1')) throw new Error('Must start with 7 or 1');
            return cleanPhone;
        }

        function formatPhoneForDisplay(phone9) {
            if (!phone9 || phone9.length !== 9) return phone9;
            return phone9.slice(0,3) + ' ' + phone9.slice(3,6) + ' ' + phone9.slice(6);
        }

        // Normalize phone number using your backend – returns "254XXXXXXXXX" (no plus)
        async function normalizePhoneNumber(rawPhone9) {
            try {
                // Send the 9-digit number (without leading 0 or 254) to your normalize endpoint
                const response = await fetch(API_ENDPOINTS.normalizePhone, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone: rawPhone9 })
                });
                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.error || 'Normalization failed');
                }
                const data = await response.json();
                // Your backend returns { normalized_phone: "254712345678" }
                if (!data.normalized_phone) throw new Error('No normalized phone returned');
                console.log('[Normalize] Received:', data.normalized_phone);
                return data.normalized_phone; // e.g., "254712345678"
            } catch (error) {
                console.error('[Normalize] Error:', error);
                // Fallback: manually convert 9-digit to 254...
                const fallback = '254' + rawPhone9;
                console.warn('[Normalize] Using fallback:', fallback);
                return fallback;
            }
        }

        // Initiate STK push via your backend
        async function sendPayHeroSTK(phoneNumber254, amount, description) {
            console.log(`[STK] Initiating: ${description}, amount ${amount}, phone ${phoneNumber254}`);
            const response = await fetch(API_ENDPOINTS.initiatePayment, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    phone_number: phoneNumber254,  // should be "254712345678"
                    amount: parseInt(amount),
                    description: description
                })
            });
            if (!response.ok) {
                const errorText = await response.text();
                console.error('[STK] Initiation failed:', errorText);
                throw new Error(errorText || 'Payment initiation failed');
            }
            const result = await response.json();
            console.log('[STK] Initiation success, reference:', result.reference);
            return result; // { success: true, reference: "...", external_reference: "..." }
        }

        // Verify payment status
        async function verifyPayment(reference) {
            const response = await fetch(`${API_ENDPOINTS.verifyPayment}?reference=${reference}`);
            if (!response.ok) throw new Error('Verification request failed');
            const data = await response.json();
            console.log('[Verify] Status for', reference, ':', data.status);
            return data;
        }

        // Poll until success or failure
        async function pollPaymentStatus(reference) {
            const maxAttempts = 12;  // 12 * 3s = 36 seconds
            const interval = 3000;
            let attempts = 0;
            
            return new Promise((resolve) => {
                const poll = async () => {
                    attempts++;
                    try {
                        const result = await verifyPayment(reference);
                        // Your backend returns status like "SUCCESS", "PENDING", "FAILED", etc.
                        if (result.status === 'SUCCESS' || result.status === 'COMPLETED') {
                            resolve({ success: true, data: result.data });
                            return;
                        } else if (result.status === 'FAILED' || result.status === 'CANCELLED' || result.status === 'TIMEOUT') {
                            resolve({ success: false, error: `Payment ${result.status.toLowerCase()}` });
                            return;
                        }
                        // Still PENDING or PROCESSING
                        if (attempts >= maxAttempts) {
                            resolve({ success: false, error: 'Payment timeout after 36 seconds' });
                            return;
                        }
                        setTimeout(poll, interval);
                    } catch (err) {
                        console.error('[Poll] Error:', err);
                        if (attempts >= maxAttempts) {
                            resolve({ success: false, error: 'Unable to verify payment status' });
                            return;
                        }
                        setTimeout(poll, interval);
                    }
                };
                poll();
            });
        }

        function showToast(message, icon = 'success') {
            Swal.mixin({ toast: true, position: 'top-end', showConfirmButton: false, timer: 2500, timerProgressBar: true }).fire({ icon, title: message });
        }

        // ----------------------------- DATA BUNDLES (same as before) -----------------------------
        const bundleData = {
            daily: {
                id: 'daily', title: 'Daily Bundles', icon: 'fas fa-sun', subtitle: 'Perfect for short-term usage',
                bundles: [
                    { id: 1, title: '24 Hours - 5GB', subtitle: 'Short-term heavy usage', price: 99, badge: null },
                    { id: 2, title: '24 Hours - 10GB', subtitle: 'Double data intensive', price: 170, badge: 'HOT' }
                ]
            },
            weekly: {
                id: 'weekly', title: 'Weekly Bundles', icon: 'fas fa-calendar-week', subtitle: 'Ideal for weekly browsing',
                bundles: [
                    { id: 3, title: '3 Days - 8GB', subtitle: 'Weekend browsing', price: 220, badge: 'VALUE' },
                    { id: 4, title: '7 Days - 12GB', subtitle: 'Full week connectivity', price: 255, badge: null },
                    { id: 5, title: '7 Days - 20GB', subtitle: 'High data streaming', price: 355, badge: null },
                    { id: 6, title: '14 Days - 25GB', subtitle: 'Two-week balanced', price: 399, badge: null }
                ]
            },
            monthly: {
                id: 'monthly', title: 'Monthly Bundles', icon: 'fas fa-calendar-alt', subtitle: 'Best value for regular users',
                bundles: [
                    { id: 7, title: '21 Days - 18GB', subtitle: 'Three-week package', price: 320, badge: null },
                    { id: 8, title: '30 Days - 25GB', subtitle: 'Best seller', price: 425, badge: 'POPULAR' },
                    { id: 9, title: '30 Days - 50GB', subtitle: 'Double data monthly', price: 640, badge: null },
                    { id: 10, title: '30 Days - 100GB', subtitle: 'Heavy user', price: 999, badge: 'HOT' }
                ]
            },
            unlimited: {
                id: 'unlimited', title: 'Unlimited Bundles', icon: 'fas fa-infinity', subtitle: 'Truly unlimited',
                bundles: [
                    { id: 11, title: '3 Days - Unlimited', subtitle: 'Short unlimited', price: 250, badge: null },
                    { id: 12, title: '7 Days - Unlimited', subtitle: 'Week unlimited', price: 399, badge: null },
                    { id: 14, title: '14 Days - Unlimited', subtitle: 'Two weeks unlimited', price: 455, badge: 'VALUE' },
                    { id: 13, title: '30 Days - Unlimited', subtitle: 'Full month', price: 750, badge: 'POPULAR' }
                ]
            }
        };

        let isProcessing = false;
        let isESIMProcessing = false;

        const tabs = document.querySelectorAll('.tab-pill');
        const bundlesContainer = document.getElementById('bundles-container');

        function renderAllBundles() {
            bundlesContainer.innerHTML = '';
            for (const [categoryKey, category] of Object.entries(bundleData)) {
                const section = document.createElement('div');
                section.className = 'category-section';
                section.id = `section-${categoryKey}`;
                section.innerHTML = `
                    <div class="category-header">
                        <div class="category-title"><i class="${category.icon}"></i>${category.title}</div>
                        <div class="category-subtitle">${category.subtitle}</div>
                    </div>
                    <div class="category-bundles" id="bundles-${categoryKey}"></div>
                `;
                const bundlesGrid = section.querySelector(`.category-bundles`);
                category.bundles.forEach(bundle => {
                    const card = document.createElement('div');
                    card.className = 'bundle-card';
                    if (bundle.badge === 'POPULAR') card.classList.add('popular');
                    if (bundle.badge === 'VALUE') card.classList.add('featured');
                    let badgeClass = '';
                    if (bundle.badge === 'POPULAR') badgeClass = 'popular-badge';
                    else if (bundle.badge === 'HOT') badgeClass = 'hot-badge';
                    else if (bundle.badge === 'VALUE') badgeClass = 'value-badge';
                    card.innerHTML = `
                        ${bundle.badge ? `<div class="bundle-badge ${badgeClass}">${bundle.badge}</div>` : ''}
                        <div class="bundle-title">${bundle.title}</div>
                        <div class="bundle-subtitle">${bundle.subtitle}</div>
                        <div class="bundle-details">
                            <div><div class="bundle-price">Ksh ${bundle.price}</div><div class="bundle-currency">Kenyan Shillings</div></div>
                            <button class="bundle-buy-btn" data-title="${bundle.title}" data-price="${bundle.price}">BUY</button>
                        </div>
                    `;
                    bundlesGrid.appendChild(card);
                });
                bundlesContainer.appendChild(section);
            }
        }

        function setupEventListeners() {
            tabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    tabs.forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    const category = tab.dataset.category;
                    if (category === 'all') window.scrollTo({ top: 0, behavior: 'smooth' });
                    else document.getElementById(`section-${category}`)?.scrollIntoView({ behavior: 'smooth', block: 'start' });
                });
            });
            bundlesContainer.addEventListener('click', (e) => {
                if (e.target.classList.contains('bundle-buy-btn')) {
                    const title = e.target.dataset.title;
                    const price = e.target.dataset.price;
                    selectBundle({ title, price });
                }
            });
            window.addEventListener('scroll', () => {
                const sections = ['daily', 'weekly', 'monthly', 'unlimited'];
                const scrollPos = window.scrollY + 100;
                for (const sec of sections) {
                    const el = document.getElementById(`section-${sec}`);
                    if (el && scrollPos >= el.offsetTop && scrollPos < el.offsetTop + el.offsetHeight) {
                        tabs.forEach(t => { t.classList.remove('active'); if (t.dataset.category === sec) t.classList.add('active'); });
                        break;
                    }
                }
                if (window.scrollY < 100) tabs.forEach(t => { t.classList.remove('active'); if (t.dataset.category === 'all') t.classList.add('active'); });
            });
        }

        // ---------- SUCCESS MODAL (with prominent Get eSIM button) ----------
        async function showSuccessWithESIMOptions(bundleTitle, recipientPhone9, amount) {
            const formatted = `0${recipientPhone9}`;
            const result = await Swal.fire({
                title: 'Success!',
                html: `
                    <div class="status-modal-content">
                        <div class="status-icon" style="color:#1d541d;"><i class="fas fa-check-circle"></i></div>
                        <div class="status-details">
                            <div><strong>${bundleTitle}</strong></div>
                            <div>${formatted}</div>
                            <div style="font-weight:700; margin-top:0.3rem;">Ksh ${amount}</div>
                        </div>
                        <div style="margin: 0.6rem 0; background:#e6f3e6; padding:0.6rem; border-radius:12px; border:1px solid #2d7a2d;">
                            <i class="fas fa-sim-card"></i> Do you have a Starlink eSIM linked to your phone number?<br>
                            <strong>If No, get eSIM now, your Starlink data will not work without a Starlink eSIM.</strong>
                        </div>
                    </div>
                `,
                showConfirmButton: true,
                confirmButtonText: 'Yes, I have eSIM',
                showDenyButton: true,
                denyButtonText: 'Get eSIM',
                customClass: { confirmButton: 'secondary-yes-btn', denyButton: 'prominent-esim-btn' },
                focusDeny: true
            });
            if (result.isConfirmed) {
                showToast('Thank you for your purchase!');
            } else if (result.isDenied) {
                await purchaseESIM();
            }
        }

        // ---------- eSIM PURCHASE (REAL STK PUSH) ----------
        async function purchaseESIM() {
            if (isESIMProcessing) return;
            isESIMProcessing = true;
            try {
                const { value: phoneRaw } = await Swal.fire({
                    title: 'Get Starlink eSIM',
                    html: `
                        <div class="modal-content">
                            <div class="modal-bundle-name">✨ Starlink eSIM · Ksh 299</div>
                            <div class="input-wrapper">
                                <label class="input-label"><i class="fas fa-mobile-alt"></i> Phone number for eSIM delivery</label>
                                <div class="phone-input-group">
                                    <div class="phone-prefix">+254</div>
                                    <input type="tel" class="phone-input" id="esim-phone" placeholder="712345678" maxlength="10">
                                </div>
                                <p class="input-note">We'll send an STK push to this number to complete payment for eSIM</p>
                            </div>
                            <div class="summary-box"><div class="summary-row total"><span>eSIM Activation Fee</span><span>Ksh 299</span></div></div>
                            <div class="secure-note"><i class="fas fa-lock"></i> Secured M-PESA payment</div>
                        </div>
                    `,
                    showCancelButton: true,
                    confirmButtonText: 'Pay Ksh 299',
                    cancelButtonText: 'Cancel',
                    preConfirm: () => {
                        const input = document.getElementById('esim-phone');
                        try { return { phone9: validatePhoneNumber(input.value) }; }
                        catch (err) { Swal.showValidationMessage(err.message); return false; }
                    }
                });
                if (!phoneRaw) return;
                await initiateESIMPayment(phoneRaw.phone9);
            } catch (err) {
                console.error('[eSIM] Purchase error:', err);
                showToast('Something went wrong', 'error');
            } finally {
                isESIMProcessing = false;
            }
        }

        async function initiateESIMPayment(phone9) {
            try {
                Swal.fire({ title: 'Processing eSIM', html: '<div style="padding:0.5rem;">Please wait...</div>', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
                const normalized254 = await normalizePhoneNumber(phone9);
                const paymentResponse = await sendPayHeroSTK(normalized254, 299, 'Starlink eSIM - One time activation');
                if (!paymentResponse?.reference) throw new Error('No reference returned from payment initiation');
                
                await Swal.fire({
                    title: 'STK Push Sent!',
                    html: `<div class="status-modal-content">
                        <div class="status-icon"><i class="fas fa-mobile-alt"></i></div>
                        <p><strong>Check your phone</strong></p>
                        <div style="background:#e6f3e6;padding:0.5rem;border-radius:10px;">0${phone9}</div>
                        <p style="font-size:0.75rem;">Enter M-PESA PIN to complete eSIM purchase</p>
                    </div>`,
                    showConfirmButton: false,
                    timer: 2500,
                    timerProgressBar: true
                });
                
                Swal.fire({ title: 'Verifying eSIM Payment', html: '<div style="padding:0.5rem;"><div class="swal2-loading" style="margin:0.5rem auto;"></div><p>Confirming transaction...</p></div>', showConfirmButton: false, allowOutsideClick: false });
                const pollResult = await pollPaymentStatus(paymentResponse.reference);
                if (pollResult.success) {
                    await Swal.fire({
                        title: 'eSIM Activated!',
                        html: `<div class="status-modal-content"><div class="status-icon" style="color:#1d541d;"><i class="fas fa-check-circle"></i></div><div class="status-details">Starlink eSIM will be delivered to 0${phone9}<br>Check SMS for installation steps</div></div>`,
                        confirmButtonText: 'Great',
                        confirmButtonColor: '#1d541d'
                    });
                    showToast('eSIM purchased successfully!');
                } else {
                    throw new Error(pollResult.error || 'eSIM payment not confirmed');
                }
            } catch (error) {
                console.error('[eSIM Payment] Error:', error);
                await Swal.fire({
                    title: 'eSIM Status',
                    html: `<div class="status-modal-content"><div class="status-icon" style="color:#f59e0b;"><i class="fas fa-exclamation-triangle"></i></div><p><strong>${error.message || 'Payment issue'}</strong></p><p style="font-size:0.7rem;">If amount deducted, contact support.</p></div>`,
                    confirmButtonText: 'OK',
                    confirmButtonColor: '#1d541d'
                });
            } finally {
                isESIMProcessing = false;
            }
        }

        // ---------- DATA BUNDLE PAYMENT (REAL STK) ----------
        function selectBundle(bundle) {
            Swal.fire({
                title: 'Send Data Bundle',
                html: `
                    <div class="modal-content">
                        <div class="modal-bundle-name">${bundle.title}</div>
                        <div class="input-wrapper">
                            <label class="input-label"><i class="fas fa-mobile-alt"></i> Phone Number</label>
                            <div class="phone-input-group">
                                <div class="phone-prefix">+254</div>
                                <input type="tel" class="phone-input" id="data-phone" placeholder="712345678" maxlength="10">
                            </div>
                            <p class="input-note">Where to send the data bundle</p>
                        </div>
                        <div class="summary-box"><div class="summary-row total"><span>Total:</span><span>Ksh ${bundle.price}</span></div></div>
                        <div class="secure-note"><i class="fas fa-lock"></i> Secured M-PESA payment</div>
                    </div>
                `,
                showCancelButton: true,
                confirmButtonText: 'Continue',
                cancelButtonText: 'Back',
                preConfirm: () => {
                    const input = document.getElementById('data-phone');
                    try { return { phone9: validatePhoneNumber(input.value) }; }
                    catch (err) { Swal.showValidationMessage(err.message); return false; }
                }
            }).then(async (result) => {
                if (result.isConfirmed && result.value) {
                    await initiateDataPayment(bundle, result.value.phone9);
                }
            });
            setTimeout(() => document.getElementById('data-phone')?.focus(), 50);
        }

        async function initiateDataPayment(bundle, phone9) {
            if (isProcessing) return;
            isProcessing = true;
            try {
                Swal.fire({ title: 'Processing', html: '<div style="padding:0.5rem;">Please wait...</div>', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
                const normalized254 = await normalizePhoneNumber(phone9);
                const paymentResponse = await sendPayHeroSTK(normalized254, parseInt(bundle.price), `Starlink Data Bundle: ${bundle.title}`);
                if (!paymentResponse?.reference) throw new Error('No reference returned');
                
                await Swal.fire({
                    title: 'STK Push Sent!',
                    html: `<div class="status-modal-content"><div class="status-icon"><i class="fas fa-mobile-alt"></i></div><p><strong>Check your phone</strong></p><div style="background:#e6f3e6;padding:0.5rem;border-radius:10px;">0${phone9}</div><p style="font-size:0.75rem;">Enter M-PESA PIN to complete payment</p></div>`,
                    showConfirmButton: false,
                    timer: 2500,
                    timerProgressBar: true
                });
                
                Swal.fire({ title: 'Verifying', html: '<div style="padding:0.5rem;"><div class="swal2-loading" style="margin:0.5rem auto;"></div><p>Confirming payment...</p></div>', showConfirmButton: false, allowOutsideClick: false });
                const pollResult = await pollPaymentStatus(paymentResponse.reference);
                if (pollResult.success) {
                    await showSuccessWithESIMOptions(bundle.title, phone9, bundle.price);
                } else {
                    throw new Error(pollResult.error || 'Payment not confirmed');
                }
            } catch (error) {
                console.error('[Data Payment] Error:', error);
                await Swal.fire({
                    title: 'Payment Status',
                    html: `<div class="status-modal-content"><div class="status-icon" style="color:#f59e0b;"><i class="fas fa-exclamation-triangle"></i></div><p><strong>${error.message || 'Payment failed'}</strong></p><p style="font-size:0.7rem;">Please try again.</p></div>`,
                    confirmButtonText: 'OK',
                    confirmButtonColor: '#1d541d'
                });
            } finally {
                isProcessing = false;
            }
        }

        function initPage() {
            renderAllBundles();
            setupEventListeners();
            document.querySelector('[data-category="all"]').classList.add('active');
        }

        document.addEventListener('DOMContentLoaded', initPage);
    </script>
</body>
</html>
