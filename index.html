    <!-- Paystack Inline JS (required for STK Push / M-Pesa) -->
    <script src="https://js.paystack.co/v1/inline.js"></script>
    <style>

        .bundle-card {

        .bundle-card.popular { border-left: 5px solid #f4b740; }

        .bundle-badge {

        .bundle-title {

        .modal-content {

        }

        .modal-bundle-name {
            background: #e6f3e6;
            padding: 0.5rem;
            border-radius: 10px;
            margin-bottom: 0.8rem;

            text-align: center;

            border: 1px solid #2d7a2d;

        }

        .input-wrapper {

        }

        .input-label {
            display: flex;
            align-items: center;
            gap: 0.3rem;
            font-size: 0.75rem;
            font-weight: 600;
            color: #1d541d;
            margin-bottom: 0.25rem;
        }

        .phone-input-group {
            display: flex;
            border: 1.5px solid #2d7a2d;
            border-radius: 12px;
            overflow: hidden;
            background: white;

        .phone-prefix {
            background: #e6f3e6;

        .phone-input {

        .input-note {

        .summary-box {
            background: #e6f3e6;

        .summary-row {

        .summary-row.total {

        @media (max-width: 350px) {

</head>
<body>
    <div class="container">
        <div class="top-bar">
            <div class="logo">
                <h1>Starlink Data Bundles</h1>
                <span>M-Pesa STK Push • Powered by Paystack</span>
            </div>
            <div class="status-chip">
                <i class="fa-solid fa-bolt"></i> 4G/5G
            </div>
        </div>

        <div class="quick-panel">
            <h2>Affordable Data Bundles</h2>
            <p>M-Pesa STK Push • Instant activation</p>
            <div class="tag-cloud">
                <span class="tag-new">Daily</span>
                <span class="tag-new">Weekly</span>
                <span class="tag-new">Monthly</span>
                <span class="tag-new">Unlimited</span>
            </div>
        </div>

        <div class="scroll-tabs" id="tabContainer">
            <button class="tab-pill" data-category="all">All Bundles</button>
            <button class="tab-pill" data-category="daily">Daily</button>
            <button class="tab-pill" data-category="weekly">Weekly</button>
            <button class="tab-pill" data-category="monthly">Monthly</button>
            <button class="tab-pill" data-category="unlimited">Unlimited</button>
        </div>

        <div class="bundles-grid" id="bundles-container"></div>

        <div class="footer">
            <div class="footer-logo">Starlink</div>
            <div>© 2025 · Kenya | M-Pesa Express</div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.7.3/dist/sweetalert2.all.min.js"></script>
    <script>
        // ============================================================
        // PAYSTACK CONFIGURATION - ONLY LIVE PUBLIC KEY (pk_live_xxx)
        // Replace with your actual Paystack Live Public Key
        // ============================================================
        const PAYSTACK_PUBLIC_KEY = 'pk_live_0edbd5c2329710431ece6e53e0e854ea785dc6c2';  // 🔴 REPLACE WITH YOUR LIVE PUBLIC KEY

        // Bundle Data (unchanged from original, but fully functional)
        const bundleData = {
            daily: {
                id: 'daily',
                title: 'Daily Bundles',
                icon: 'fas fa-sun',
                subtitle: 'Perfect for short-term usage',
                bundles: [
                    { id: 1, title: '24 Hours - 5GB', subtitle: 'Short-term heavy usage', price: 99, badge: null },
                    { id: 2, title: '24 Hours - 10GB', subtitle: 'Double data intensive', price: 170, badge: 'HOT' }
                ]
            },
            weekly: {
                id: 'weekly',
                title: 'Weekly Bundles',
                icon: 'fas fa-calendar-week',
                subtitle: 'Ideal for weekly browsing',
                bundles: [
                    { id: 3, title: '3 Days - 8GB', subtitle: 'Weekend browsing', price: 220, badge: 'VALUE' },
                    { id: 4, title: '7 Days - 12GB', subtitle: 'Full week connectivity', price: 255, badge: null },
                    { id: 5, title: '7 Days - 20GB', subtitle: 'High data streaming', price: 355, badge: null },
                    { id: 6, title: '14 Days - 25GB', subtitle: 'Two-week balanced', price: 399, badge: null }
                ]
            },
            monthly: {
                id: 'monthly',
                title: 'Monthly Bundles',
                icon: 'fas fa-calendar-alt',
                subtitle: 'Best value for regular users',
                bundles: [
                    { id: 7, title: '21 Days - 18GB', subtitle: 'Three-week package', price: 320, badge: null },
                    { id: 8, title: '30 Days - 25GB', subtitle: 'Best seller', price: 425, badge: 'POPULAR' },
                    { id: 9, title: '30 Days - 50GB', subtitle: 'Double data monthly', price: 640, badge: null },
                    { id: 10, title: '30 Days - 100GB', subtitle: 'Heavy user', price: 999, badge: 'HOT' }
                ]
            },
            unlimited: {
                id: 'unlimited',
                title: 'Unlimited Bundles',
                icon: 'fas fa-infinity',
                subtitle: 'Truly unlimited',
                bundles: [
                    { id: 11, title: '3 Days - Unlimited', subtitle: 'Short unlimited', price: 250, badge: null },
                    { id: 12, title: '7 Days - Unlimited', subtitle: 'Week unlimited', price: 399, badge: null },
                    { id: 14, title: '14 Days - Unlimited', subtitle: 'Two weeks unlimited', price: 455, badge: 'VALUE' },
                    { id: 13, title: '30 Days - Unlimited', subtitle: 'Full month', price: 750, badge: 'POPULAR' }
                ]
            }
        };

        let activeTransaction = false;

        // Helper: normalize Kenyan phone number (accepts 07XX, 7XX, +254... returns '2547XXXXXXXX')
        function normalizeMpesaPhone(rawPhone) {
            let cleaned = rawPhone.replace(/\D/g, '');
            if (cleaned.startsWith('0')) {
                cleaned = cleaned.substring(1);
            }
            if (cleaned.startsWith('254')) {
                cleaned = cleaned.substring(3);
            }
            if (cleaned.length !== 9) {
                throw new Error('Enter valid 9-digit Safaricom number (e.g., 712345678)');
            }
            if (!cleaned.startsWith('7') && !cleaned.startsWith('1')) {
                throw new Error('Number must start with 7 or 1 (Safaricom/Airtel)');
            }
            return '254' + cleaned;
        }

        // Format phone for display
        function formatPhoneDisplay(phone254) {
            if (!phone254 || phone254.length !== 12) return phone254;
            const national = phone254.substring(3);
            return national.slice(0,3) + ' ' + national.slice(3,6) + ' ' + national.slice(6);
        }

        // Generate random reference (Paystack requirement)
        function generateReference() {
            return 'STARLINK_' + Date.now() + '_' + Math.random().toString(36).substring(2, 8).toUpperCase();
        }

        // Paystack STK Push Integration (M-Pesa Express)
        async function initiatePaystackMpesa(bundle, mpesaNumberRaw) {
            if (activeTransaction) {
                Swal.fire('Please wait', 'Another transaction is processing', 'info');
                return false;
            }
            
            let normalizedPhone;
            try {
                normalizedPhone = normalizeMpesaPhone(mpesaNumberRaw);
            } catch (err) {
                Swal.fire('Invalid Number', err.message, 'error');
                return false;
            }

            // Build customer email from phone number (Paystack requires email)
            const customerEmail = `user${normalizedPhone.substring(3)}@starlink.ke`;
            const amountInKsh = bundle.price;
            const amountInKobo = amountInKsh * 100; // Paystack uses kobo/cent (1 KES = 100 subunits)
            const reference = generateReference();

            // Paystack inline options - M-Pesa STK Push will be triggered automatically when user selects M-Pesa on modal
            // By default, Paystack popup shows various payment methods including M-Pesa.
            // We also prefill the phone number to make M-Pesa STK Push smoother.
            const handler = PaystackPop.setup({
                key: PAYSTACK_PUBLIC_KEY,
                email: customerEmail,
                amount: amountInKobo,
                currency: 'KES',
                ref: reference,
                // Prefill phone number (M-Pesa)
                'phone': normalizedPhone,
                metadata: {
                    custom_fields: [
                        { display_name: "Data Bundle", variable_name: "bundle", value: bundle.title },
                        { display_name: "Recipient Phone", variable_name: "recipient", value: normalizedPhone }
                    ]
                },
                channels: ['mobile_money'],    // force M-Pesa & mobile money focus (STK Push)
                callback: function(response) {
                    // Payment successful - Paystack will have sent STK push and user completed
                    if (response.status === 'success') {
                        showPaymentSuccess(bundle, normalizedPhone, response.reference);
                    } else {
                        showPaymentError('Payment could not be verified');
                    }
                    activeTransaction = false;
                },
                onClose: function() {
                    // User closed the popup without completing
                    Swal.fire({
                        title: 'Cancelled',
                        text: 'M-Pesa STK Push was cancelled. No charge occurred.',
                        icon: 'info',
                        confirmButtonText: 'OK',
                        confirmButtonColor: '#1d541d'
                    });
                    activeTransaction = false;
                }
            });
            
            handler.openIframe();
            activeTransaction = true;
            return true;
        }

        // Success modal after STK Push completion
        function showPaymentSuccess(bundle, phoneNumber, transactionRef) {
            Swal.fire({
                title: '✅ Payment Successful!',
                html: `
                    <div style="text-align:center;">
                        <i class="fas fa-check-circle" style="font-size: 2.5rem; color: #1d541d; margin-bottom: 0.5rem;"></i>
                        <div style="background: #e6f3e6; padding: 0.6rem; border-radius: 12px; margin-top: 0.4rem;">
                            <strong>${bundle.title}</strong><br>
                            📱 ${formatPhoneDisplay(phoneNumber)}<br>
                            💰 Ksh ${bundle.price}<br>
                            <small style="color:#2d7a2d;">Ref: ${transactionRef.substring(0,12)}...</small>
                        </div>
                        <p style="font-size:0.7rem; margin-top:0.6rem;">Data bundle will be activated instantly.<br>Check your SMS for confirmation.</p>
                    </div>
                `,
                icon: 'success',
                confirmButtonText: 'Great!',
                confirmButtonColor: '#1d541d',
                backdrop: true
            });
        }

        function showPaymentError(errorMsg) {
            Swal.fire({
                title: '⚠️ Transaction Issue',
                html: `
                    <div style="text-align:center;">
                        <i class="fas fa-exclamation-triangle" style="font-size: 2rem; color: #f4b740;"></i>
                        <p style="margin-top: 0.5rem;"><strong>${errorMsg || 'M-Pesa STK Push failed'}</strong></p>
                        <p style="font-size:0.7rem;">Please try again or contact support.</p>
                    </div>
                `,
                confirmButtonText: 'Close',
                confirmButtonColor: '#1d541d'
            });
        }

        // ----- Phone Input Modal (Collect M-Pesa number) then trigger Paystack -----
        function showPhoneModalForBundle(bundle) {
            Swal.fire({
                title: 'M-Pesa STK Push',
                html: `
                    <div class="modal-content">
                        <div class="modal-bundle-name">
                            ${bundle.title} &nbsp;|&nbsp; Ksh ${bundle.price}
                        </div>
                        <div class="input-wrapper">
                            <label class="input-label">
                                <i class="fas fa-mobile-alt"></i> M-Pesa Number
                            </label>
                            <div class="phone-input-group">
                                <div class="phone-prefix">+254</div>
                                <input type="tel" class="phone-input" id="mpesa-phone" placeholder="712345678" maxlength="10">
                            </div>
                            <p class="input-note">You'll receive an STK Push on this number</p>
                        </div>
                        <div class="summary-box">
                            <div class="summary-row">
                                <span>Data Bundle:</span>
                                <span><strong>${bundle.title}</strong></span>
                            </div>
                            <div class="summary-row total">
                                <span>Total:</span>
                                <span>Ksh ${bundle.price}</span>
                            </div>
                        </div>
                        <div class="secure-note">
                            <i class="fas fa-lock"></i> Secured by Paystack • M-Pesa Express
                        </div>
                    </div>
                `,
                showCancelButton: true,
                confirmButtonText: 'Pay Now',
                cancelButtonText: 'Cancel',
                focusConfirm: false,
                customClass: {
                    confirmButton: 'swal2-confirm',
                    cancelButton: 'swal2-cancel'
                },
                preConfirm: () => {
                    const phoneInput = document.getElementById('mpesa-phone');
                    let rawPhone = phoneInput ? phoneInput.value.trim() : '';
                    if (!rawPhone) {
                        Swal.showValidationMessage('Enter M-Pesa number');
                        return false;
                    }
                    try {
                        // Validate format but keep original for payment call
                        normalizeMpesaPhone(rawPhone);
                        return { phone: rawPhone };
                    } catch (err) {
                        Swal.showValidationMessage(err.message);
                        return false;
                    }
                }
            }).then((result) => {
                if (result.isConfirmed && result.value) {
                    initiatePaystackMpesa(bundle, result.value.phone);
                }
            });
            
            // Auto focus after modal render
            setTimeout(() => {
                const phoneField = document.getElementById('mpesa-phone');
                if (phoneField) {
                    phoneField.addEventListener('input', function(e) {
                        this.value = this.value.replace(/\D/g, '').slice(0, 10);
                    });
                    phoneField.focus();
                }
            }, 80);
        }

        // ----- RENDER BUNDLES (identical to original but uses new purchase trigger) -----
        function renderAllBundles() {
            const container = document.getElementById('bundles-container');
            container.innerHTML = '';
            for (const [categoryKey, category] of Object.entries(bundleData)) {
                const categorySection = document.createElement('div');
                categorySection.className = 'category-section';
                categorySection.id = `section-${categoryKey}`;
                categorySection.dataset.category = categoryKey;
                
                const categoryHeader = document.createElement('div');
                categoryHeader.className = 'category-header';
                categoryHeader.innerHTML = `
                    <div class="category-title">
                        <i class="${category.icon}"></i>
                        ${category.title}
                    </div>
                    <div class="category-subtitle">${category.subtitle}</div>
                `;
                
                const categoryBundles = document.createElement('div');
                categoryBundles.className = 'category-bundles';
                
                category.bundles.forEach(bundle => {
                    const bundleCard = document.createElement('div');
                    bundleCard.className = 'bundle-card';
                    if (bundle.badge === 'POPULAR') bundleCard.classList.add('popular');
                    if (bundle.badge === 'VALUE') bundleCard.classList.add('featured');
                    
                    let badgeClass = '';
                    if (bundle.badge === 'POPULAR') badgeClass = 'popular-badge';
                    else if (bundle.badge === 'HOT') badgeClass = 'hot-badge';
                    else if (bundle.badge === 'VALUE') badgeClass = 'value-badge';
                    
                    bundleCard.innerHTML = `
                        ${bundle.badge ? `<div class="bundle-badge ${badgeClass}">${bundle.badge}</div>` : ''}
                        <div class="bundle-title">${bundle.title}</div>
                        <div class="bundle-subtitle">${bundle.subtitle}</div>
                        <div class="bundle-details">
                            <div>
                                <div class="bundle-price">Ksh ${bundle.price}</div>
                                <div class="bundle-currency">M-Pesa STK Push</div>
                            </div>
                            <button class="bundle-buy-btn" data-id="${bundle.id}" data-title="${bundle.title}" data-price="${bundle.price}">
                                BUY
                            </button>
                        </div>
                    `;
                    categoryBundles.appendChild(bundleCard);
                });
                categorySection.appendChild(categoryHeader);
                categorySection.appendChild(categoryBundles);
                container.appendChild(categorySection);
            }
        }

        // Setup event listeners for tabs, scroll, and buy buttons (delegation)
        function setupInteractions() {
            const tabs = document.querySelectorAll('.tab-pill');
            tabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    tabs.forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    const category = tab.dataset.category;
                    if (category === 'all') {
                        window.scrollTo({ top: 0, behavior: 'smooth' });
                    } else {
                        const section = document.getElementById(`section-${category}`);
                        if (section) section.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    }
                });
            });
            
            const container = document.getElementById('bundles-container');
            container.addEventListener('click', (e) => {
                const btn = e.target.closest('.bundle-buy-btn');
                if (!btn) return;
                const bundleTitle = btn.dataset.title;
                const bundlePrice = parseInt(btn.dataset.price);
                // Find full bundle object from any category (we just need title & price)
                let foundBundle = null;
                for (let cat of Object.values(bundleData)) {
                    foundBundle = cat.bundles.find(b => b.title === bundleTitle && b.price === bundlePrice);
                    if (foundBundle) break;
                }
                if (foundBundle) {
                    showPhoneModalForBundle({ title: foundBundle.title, price: foundBundle.price });
                } else {
                    showPhoneModalForBundle({ title: bundleTitle, price: bundlePrice });
                }
            });
            
            // Scroll spy: highlight tabs based on visible section
            const sectionsList = ['daily', 'weekly', 'monthly', 'unlimited'];
            window.addEventListener('scroll', () => {
                const scrollPos = window.scrollY + 100;
                for (let secId of sectionsList) {
                    const section = document.getElementById(`section-${secId}`);
                    if (section) {
                        const top = section.offsetTop;
                        const bottom = top + section.offsetHeight;
                        if (scrollPos >= top && scrollPos < bottom) {
                            tabs.forEach(t => {
                                t.classList.remove('active');
                                if (t.dataset.category === secId) t.classList.add('active');
                            });
                            break;
                        }
                    }
                }
                if (window.scrollY < 100) {
                    tabs.forEach(t => {
                        t.classList.remove('active');
                        if (t.dataset.category === 'all') t.classList.add('active');
                    });
                }
            });
        }

        // Validate public key presence
        function validatePaystackKey() {
            if (!PAYSTACK_PUBLIC_KEY || PAYSTACK_PUBLIC_KEY === 'pk_live_XXXXXXXXXXXXXXXXXXXXXX') {
                console.warn('⚠️ Replace PAYSTACK_PUBLIC_KEY with your live Paystack public key');
                Swal.fire({
                    title: 'Paystack Key Required',
                    text: 'Please set your Paystack LIVE public key in the script (pk_live_xxx). M-Pesa STK Push will work after that.',
                    icon: 'info',
                    confirmButtonText: 'Got it',
                    confirmButtonColor: '#1d541d'
                });
            }
        }
        
        // INIT
        document.addEventListener('DOMContentLoaded', () => {
            renderAllBundles();
            setupInteractions();
            validatePaystackKey();
        });
    </script>
</body>
</html>
